<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wartung</title>
    <!-- CSS bewusst inline: während der Wartung blockiert das maintenance_gate
         alle Pfade außer dem Status-Endpunkt, also auch /app.css. -->
    <style>
        :root {
            --magenta: #E80442; --violet: #CE468D;
            --grad: linear-gradient(120deg, var(--magenta), var(--violet));
            --brand-100: #FBE3EC;
            --ink-900: #211C1E; --ink-600: #5A5350; --ink-400: #988F8A;
            --line: #E8E3DF; --surface: #fff; --bg: #F8F7F6;
            --r-md: 12px; --r-xl: 24px;
            --shadow-sm: 0 1px 2px rgba(40, 20, 28, .06);
            --shadow-md: 0 4px 16px rgba(40, 20, 28, .08);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; }
        body {
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
            color: var(--ink-900); background: var(--bg);
            background-image: radial-gradient(1100px 460px at 50% -180px, var(--brand-100) 0%, rgba(251, 227, 236, 0) 70%);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .app-header { width: 100%; max-width: 1120px; margin: 0 auto; padding: 22px 24px; display: flex; align-items: center; }
        .brand { display: flex; align-items: center; gap: 11px; }
        .brand-mark { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; background: var(--grad); color: #fff; box-shadow: var(--shadow-sm); }
        .brand-mark svg { width: 20px; height: 20px; }
        .brand-name { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
        .brand-sub { font-size: 12.5px; color: var(--ink-400); margin-top: -2px; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 24px 72px; }
        .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); box-shadow: var(--shadow-md); padding: 32px; }
        h1 { font-size: 24px; font-weight: 700; letter-spacing: -.01em; margin: 0 0 8px; }
        p { color: var(--ink-600); margin: 0 0 22px; }

        .bar { height: 12px; background: #F0ECE9; border-radius: 999px; overflow: hidden; }
        #fill { height: 100%; width: 0; background: var(--grad); border-radius: 999px; transition: width .4s ease; }
        #count { margin: 14px 0 0; font-size: 14px; color: var(--ink-600); }

        @media (prefers-reduced-motion: reduce) { #fill { transition: none; } }
        @media (max-width: 560px) { .card { padding: 22px; } }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.5 8.5 0 0 1 21 11.5Z"/></svg>
            </span>
            <span>
                <div class="brand-name">Stimmungsbarometer</div>
                <div class="brand-sub">Adminbereich</div>
            </span>
        </div>
    </header>

    <main>
        <div class="card">
            <h1>Wartung läuft</h1>
            <p>Das Feedback wird neu ausgewertet. Der Server ist solange nicht erreichbar.</p>
            <div class="bar"><div id="fill"></div></div>
            <p id="count" aria-live="polite">Wird vorbereitet ...</p>
        </div>
    </main>

    <script>
        async function poll() {
            try {
                const res = await fetch("/admin/reevaluate/status");
                const status = await res.json();
                if (!status.active) {
                    window.location = "/admin";
                    return;
                }
                const total = status.total || 0;
                const done = status.done || 0;
                const percent = total ? Math.round(done / total * 100) : 0;
                document.getElementById("fill").style.width = percent + "%";
                document.getElementById("count").textContent = total
                    ? `${done} von ${total} ausgewertet, ${total - done} verbleibend`
                    : "Wird vorbereitet ...";
            } catch (e) {
                // Server kurz nicht erreichbar, nächster Versuch folgt.
            }
        }

        poll();
        setInterval(poll, 1000);
    </script>
</body>
</html>
