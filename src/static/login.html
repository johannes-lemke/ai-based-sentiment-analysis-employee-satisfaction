<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.5 8.5 0 0 1 21 11.5Z"/></svg>
            </span>
            <span>
                <div class="brand-name">Stimmungsbarometer</div>
                <div class="brand-sub">Adminbereich</div>
            </span>
        </div>
    </header>

    <main class="page-center">
        <div class="card auth-card">
            <h1 class="auth-title">Anmeldung</h1>
            <p class="auth-sub">Bitte melde dich an, um zur Auswertung zu gelangen.</p>

            <div id="error" class="alert-error" hidden>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
                <span>Falsches Passwort. Bitte versuche es erneut.</span>
            </div>

            <form method="post" action="/admin/login">
                <label class="field-label" for="password">Passwort</label>
                <input id="password" type="password" name="password" autocomplete="current-password" autofocus>
                <button type="submit" class="btn-primary">
                    Anmelden
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                </button>
            </form>
        </div>
    </main>

    <script>
        if (new URLSearchParams(location.search).has("error")) {
            document.getElementById("error").hidden = false;
        }
    </script>
</body>
</html>
